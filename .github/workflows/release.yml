name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/adyen-cli-linux-amd64 ./src/adyen-cli
          GOOS=linux   GOARCH=arm64 go build -o dist/adyen-cli-linux-arm64 ./src/adyen-cli
          GOOS=darwin  GOARCH=amd64 go build -o dist/adyen-cli-darwin-amd64 ./src/adyen-cli
          GOOS=darwin  GOARCH=arm64 go build -o dist/adyen-cli-darwin-arm64 ./src/adyen-cli
          GOOS=windows GOARCH=amd64 go build -o dist/adyen-cli-windows-amd64.exe ./src/adyen-cli

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "Kwok-he-Chu"
          git config user.email "Kwok-he-Chu@users.noreply.github.com"

          # Fail if the tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists."
            exit 1
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/adyen-cli-linux-amd64
            dist/adyen-cli-linux-arm64
            dist/adyen-cli-darwin-amd64
            dist/adyen-cli-darwin-arm64
            dist/adyen-cli-windows-amd64.exe
